<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ceylin'e Özel Aşk Kavanozu</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&family=Poppins:wght@300;400&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            /* Arka Plan: Senin gönderdiğin resim1.jpg */
            background: url('resim1.jpg') center center;
            background-size: cover;
            font-family: 'Poppins', sans-serif;
            overflow: hidden;
            position: relative;
        }

        /* Arka planın çok koyu kalmaması için hafif bir katman */
        body::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.3);
            z-index: 0;
        }

        h1 {
            font-family: 'Dancing Script', cursive;
            color: #ffffff;
            font-size: 3.5rem;
            margin-bottom: 20px;
            z-index: 1;
            text-shadow: 2px 2px 8px rgba(0,0,0,0.5);
        }

        .container {
            position: relative;
            width: 350px;
            height: 450px;
            display: flex;
            justify-content: center;
            align-items: flex-end;
            z-index: 1;
        }

        /* Kavanoz: Senin gönderdiğin resim2.jpg */
        .jar-wrapper {
            width: 280px;
            height: 380px;
            background: url('resim2.jpg') no-repeat center center;
            background-size: contain;
            cursor: pointer;
            position: relative;
            z-index: 10;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            /* Hafif ışıltı efekti */
            filter: drop-shadow(0 10px 20px rgba(0,0,0,0.4));
        }

        .jar-wrapper:hover {
            transform: scale(1.05);
        }

        /* Mesaj Kağıdı */
        .paper {
            position: absolute;
            bottom: 200px;
            width: 300px;
            min-height: 180px;
            background: #fffdf5;
            border-radius: 5px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            padding: 30px;
            text-align: center;
            font-size: 1.2rem;
            color: #333;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 5;
            opacity: 0;
            transform: scale(0.1) translateY(150px);
            pointer-events: none;
            border: 1px solid #ddd;
        }

        .paper::before {
            content: 'Ceylin için bir not...';
            position: absolute;
            top: 15px;
            left: 20px;
            font-family: 'Dancing Script', cursive;
            color: #d63031;
            font-size: 1.3rem;
        }

        #message-text {
            line-height: 1.6;
            font-weight: 400;
        }

        /* Animasyonlar */
        .shake {
            animation: jarShake 0.6s ease-in-out;
        }

        @keyframes jarShake {
            0% { transform: rotate(0); }
            20% { transform: rotate(8deg); }
            40% { transform: rotate(-8deg); }
            60% { transform: rotate(5deg); }
            80% { transform: rotate(-5deg); }
            100% { transform: rotate(0); }
        }

        .pop-out {
            animation: paperPop 1.2s forwards cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes paperPop {
            0% { opacity: 0; transform: scale(0.1) translateY(150px); }
            60% { opacity: 1; transform: scale(1.1) translateY(-220px); }
            100% { opacity: 1; transform: scale(1) translateY(-180px); }
        }

        .instruction {
            margin-top: 40px;
            color: #eee;
            font-size: 1rem;
            z-index: 1;
            background: rgba(0,0,0,0.4);
            padding: 8px 20px;
            border-radius: 30px;
            backdrop-filter: blur(5px);
        }
    </style>
</head>
<body>

    <h1>Ceylin İçin...</h1>

    <div class="container">
        <div class="paper" id="paper">
            <p id="message-text"></p>
        </div>

        <div class="jar-wrapper" id="jar" onclick="openJar()"></div>
    </div>

    <p class="instruction">Mesaj çekmek için kavanoza dokun</p>

    <script>
        const messages = [
            "Seni seviyorum çünkü sen her halinle çok tatlısın.",
            "Seni seviyorum çünkü sen benim için bir sevgiliden öte; çocuklarımın annesi ve benim eşim olacaksın.",
            "Seni seviyorum çünkü seninleyken kendimi dünyanın en şanslı insanı gibi hissediyorum.",
            "Seni seviyorum çünkü sadece sesini duymak bile en kötü günümü bir anda güzelleştirebiliyor.",
            "Seni seviyorum çünkü o içten gülüşün dünyadaki en sevdiğim manzara.",
            "Seni seviyorum çünkü senin yanında en savunmasız halimle bile kendimi güvende hissediyorum.",
            "Seni seviyorum çünkü bana 'biz' olmanın ne kadar kıymetli bir şey olduğunu öğrettin.",
            "Seni seviyorum çünkü kurduğum tüm gelecek hayallerimin başrolünde her zaman sen varsın.",
            "Seni seviyorum çünkü senin kalbinin güzelliği, yüzüne yansıyan o eşsiz ışıkta gizli.",
            "Seni seviyorum çünkü uykulu ses tonun bile bana huzur veriyor.",
            "Seni seviyorum çünkü beni ben olduğum için, tüm kusurlarımla birlikte sevdiğini biliyorum.",
            "Seni seviyorum çünkü seninle geçen her saniye, hayatımın en değerli anısı haline geliyor.",
            "Seni seviyorum çünkü bana bakarken gözlerinde gördüğüm o şefkati başka hiçbir yerde bulamam.",
            "Seni seviyorum çünkü hayatın karmaşası içinde benim sığınağımsın.",
            "Seni seviyorum çünkü her 'hoşça kal' dediğimizde, bir sonraki görüşmeyi iple çekmemi sağlıyorsun.",
            "Seni seviyorum çünkü sen sadece sevgilim değil, benim en güzel hikayemsin.",
            "Seni seviyorum çünkü seninle her gün, yeniden aşık olmak için yeni bir sebep buluyorum.",
            "Seni seviyorum çünkü iyi ki varsın ve iyi ki benimsin."
        ];

        let isAnimating = false;

        function openJar() {
            if (isAnimating) return;
            isAnimating = true;

            const jar = document.getElementById('jar');
            const paper = document.getElementById('paper');
            const messageText = document.getElementById('message-text');

            paper.classList.remove('pop-out');
            jar.classList.add('shake');

            setTimeout(() => {
                jar.classList.remove('shake');
                
                const randomIndex = Math.floor(Math.random() * messages.length);
                messageText.innerHTML = messages[randomIndex];

                paper.classList.add('pop-out');
                
                setTimeout(() => {
                    isAnimating = false;
                }, 1200);
            }, 600);
        }
    </script>
</body>
</html>
