<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ceylin'e Özel Aşk Kavanozu ❤️</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&family=Poppins:wght@300;400&display=swap" rel="stylesheet">
    <style>
        /* 1. Arka Plan ve Taşma Engelleme */
        body {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            /* resim1.jpg arka plan olarak ayarlandı */
            background: url('resim1.jpg') no-repeat center center fixed;
            background-size: cover;
            font-family: 'Poppins', sans-serif;
            overflow: hidden; /* Taşmayı kesin olarak engeller */
            position: relative;
        }

        /* Görsellerin üzerine hafif bir karanlık katman (Yazıların okunması için) */
        body::after {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.4);
            z-index: 0;
        }

        h1 {
            font-family: 'Dancing Script', cursive;
            color: #ffffff;
            font-size: 2.5rem;
            margin: 0 0 20px 0;
            z-index: 2;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.7);
            text-align: center;
        }

        /* 2. Esnek Konteynır */
        .container {
            position: relative;
            width: 90%;
            max-width: 400px;
            height: 60vh; /* Ekranın %60'ını kaplar, taşmaz */
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 2;
        }

        /* 3. Kavanoz Görseli (resim2.jpg) */
        .jar-wrapper {
            width: 100%;
            height: 100%;
            background: url('resim2.jpg') no-repeat center center;
            background-size: contain; /* Kavanozu kutuya sığdırır */
            cursor: pointer;
            transition: transform 0.3s ease;
            filter: drop-shadow(0 10px 15px rgba(0,0,0,0.5));
        }

        .jar-wrapper:hover {
            transform: scale(1.03);
        }

        /* 4. Açılan Mesaj Kağıdı */
        .paper {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 85%;
            min-height: 120px;
            background: #fffdf5;
            border-radius: 10px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.6);
            padding: 20px;
            text-align: center;
            font-size: 1.1rem;
            color: #333;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 15;
            opacity: 0;
            /* Merkezden çıkması için ayarlandı */
            transform: translate(-50%, -50%) scale(0.1);
            pointer-events: none;
            border-left: 5px solid #d63031;
        }

        /* 5. Animasyonlar */
        .shake {
            animation: jarShake 0.5s ease-in-out;
        }

        @keyframes jarShake {
            0%, 100% { transform: rotate(0); }
            25% { transform: rotate(5deg); }
            75% { transform: rotate(-5deg); }
        }

        .pop-out {
            animation: paperPop 0.8s forwards cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes paperPop {
            0% { opacity: 0; transform: translate(-50%, -50%) scale(0.1); }
            100% { opacity: 1; transform: translate(-50%, -110%) scale(1); }
        }

        .instruction {
            margin-top: 30px;
            color: #fff;
            font-size: 0.9rem;
            z-index: 2;
            background: rgba(214, 48, 49, 0.8);
            padding: 10px 20px;
            border-radius: 50px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            cursor: pointer;
        }
    </style>
</head>
<body>

    <h1>Ceylin İçin...</h1>

    <div class="container">
        <div class="paper" id="paper">
            <p id="message-text"></p>
        </div>

        <div class="jar-wrapper" id="jar" onclick="openJar()"></div>
    </div>

    <div class="instruction" onclick="openJar()">Mesaj çekmek için kavanoza tıkla ❤️</div>

    <script>
        // Senin hazırladığın özel mesaj listesi
        const messages = [
            "Seni seviyorum çünkü sen her halinle çok tatlısın.",
            "Seni seviyorum çünkü sen benim için bir sevgiliden öte; çocuklarımın annesi ve benim eşim olacaksın.",
            "Seni seviyorum çünkü seninleyken kendimi dünyanın en şanslı insanı gibi hissediyorum.",
            "Seni seviyorum çünkü sadece sesini duymak bile en kötü günümü bir anda güzelleştirebiliyor.",
            "Seni seviyorum çünkü o içten gülüşün dünyadaki en sevdiğim manzara.",
            "Seni seviyorum çünkü senin yanında en savunmasız halimle bile kendimi güvende hissediyorum.",
            "Seni seviyorum çünkü bana 'biz' olmanın ne kadar kıymetli bir şey olduğunu öğrettin.",
            "Seni seviyorum çünkü kurduğum tüm gelecek hayallerimin başrolünde her zaman sen varsın.",
            "Seni seviyorum çünkü senin kalbinin güzelliği, yüzüne yansıyan o eşsiz ışıkta gizli.",
            "Seni seviyorum çünkü uykulu ses tonun bile bana huzur veriyor.",
            "Seni seviyorum çünkü beni ben olduğum için, tüm kusurlarımla birlikte sevdiğini biliyorum.",
            "Seni seviyorum çünkü seninle geçen her saniye, hayatımın en değerli anısı haline geliyor.",
            "Seni seviyorum çünkü bana bakarken gözlerinde gördüğüm o şefkati başka hiçbir yerde bulamam.",
            "Seni seviyorum çünkü hayatın karmaşası içinde benim sığınağımsın.",
            "Seni seviyorum çünkü her 'hoşça kal' dediğimizde, bir sonraki görüşmeyi iple çekmemi sağlıyorsun.",
            "Seni seviyorum çünkü sen sadece sevgilim değil, benim en güzel hikayemsin.",
            "Seni seviyorum çünkü seninle her gün, yeniden aşık olmak için yeni bir sebep buluyorum.",
            "Seni seviyorum çünkü iyi ki varsın ve iyi ki benimsin."
        ];

        let isAnimating = false;

        function openJar() {
            if (isAnimating) return;
            isAnimating = true;

            const jar = document.getElementById('jar');
            const paper = document.getElementById('paper');
            const messageText = document.getElementById('message-text');

            // Sıfırlama
            paper.classList.remove('pop-out');
            jar.classList.add('shake');

            setTimeout(() => {
                jar.classList.remove('shake');
                
                // Rastgele mesaj
                const randomIndex = Math.floor(Math.random() * messages.length);
                messageText.innerHTML = messages[randomIndex];

                // Kağıdı göster
                paper.classList.add('pop-out');
                
                setTimeout(() => {
                    isAnimating = false;
                }, 800);
            }, 500);
        }
    </script>
</body>
</html>
